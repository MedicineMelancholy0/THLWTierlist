  <div class="theme-toggle">
    <input type="radio" id="mode_dark" name="mode" value="dark">
    <label for="mode_dark" aria-label="Switch to dark mode">🌙</label>
    <input type="radio" id="mode_light" name="mode" value="light">
    <label for="mode_light" aria-label="Switch to light mode">☀️</label>
  </div>

  <script src="src/js/data/tierlist.js"></script>

  <script>
    const characters = dataSet[dataSetVersion].characterData;

    function renderCharacterToTier(item, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      const imgContainer = document.createElement("div");
      imgContainer.style.display = "inline-block";
      imgContainer.innerHTML = `<img src="src/assets/chara/${item.img}" alt="${item.name}" />`; 
      container.appendChild(imgContainer);
    }
  </script> <!--Dummy-->
  <div id="Dummy" class="tier-row"></div>
  
  <script>
    characters
      .filter(item => item.tier === "Dummy")
      .forEach(item => renderCharacterToTier(item, "Dummy"));
  </script>

<script>
function infoBoxEventsExample1() {
    // 1. Define the content: a styled textbox (using Metro UI input styles)
    var html_content = 
        "<h5>Enter Information</h5>" +
        "<div class='form-group'>" +
            "<input type='text' data-role='input' placeholder='Type here...'>" +
        "</div>";

    // 2. Create the InfoBox with a specified size and overlay enabled
    Metro.infobox.create(html_content, "AAAAAAAAAA", {
        width: 100,             // Set width to 100px (NOTE: 100px is very small; consider 300 if text is cut off)
        height: 50,             // Set height to 50px
        overlay: true,          // Displays the dark backdrop overlay behind the box
        overlayColor: "#000",   // Optional: Customize overlay color
        overlayAlpha: 0.5,      // Optional: Opacity of the overlay
        closeButton: true       // Show the "X" close button so users can close it
    });
}
</script>

<button class="button" onclick="infoBoxEventsExample1()">Explanation</button>
